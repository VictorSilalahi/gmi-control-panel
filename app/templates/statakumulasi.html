<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akumulasi | GMI Control Panel</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
<body>
    <div class="container-fluid">

        <div class="row">

            <div class="col-1">
            </div>
            <div class="col-10">
                
                <header>
                    <nav class="navbar navbar-expand-lg bg-body-tertiary">
                        <div class="container-fluid">
                          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                            <div class="navbar-nav">
                              <a class="nav-link" href="/pengaturanmenu">Pengaturan Menu</a>
                              <a class="nav-link" href="/statdistrik">Statistik Distrik</a>
                              <a class="nav-link active" aria-current="page" href="/statakumulasi">Akumulasi</a>
                              <a class="nav-link" href="#">Statistik Keuangan</a>
                              <a class="nav-link" href="#">Asset</a>
                              <a class="nav-link" href="#">Daftar User</a>
                              <a class="nav-link" href="/logout"><span class="badge text-bg-danger">Logout</span></a>
                            </div>
                          </div>
                        </div>
                      </nav>
                </header>

                <br>

                <div class="row">
                  <div class="col-3">
                    
                      <div class="card">
                        <div class="card-header">
                          Jumlah Distrik
                        </div>
                        <div class="card-body">
                          <div id="jlhDistrik">
                            <div class="spinner-border" role="status">
                              <span class="visually-hidden">...</span>
                            </div>
                          </div>
                        </div>
                      </div>                    

                  </div>
                  <div class="col-3">
                      <div class="card">
                        <div class="card-header">
                          Jumlah Gereja
                        </div>
                        <div class="card-body">
                          <div id="jlhGereja">
                            <div class="spinner-border" role="status">
                              <span class="visually-hidden">...</span>
                            </div>
                          </div>
                        </div>
                      </div>                    

                  </div>
                  <div class="col-3">
                      <div class="card">
                        <div class="card-header">
                          Jumlah KK
                        </div>
                        <div class="card-body">
                          <div id="jlhKK">
                            <div class="spinner-border" role="status">
                              <span class="visually-hidden">...</span>
                            </div>
                          </div>
                        </div>
                      </div>                    
                  </div>
                  <div class="col-3">
                      <div class="card">
                        <div class="card-header">
                          Jumlah Jiwa
                        </div>
                        <div class="card-body">
                          <div id="jlhJiwa">
                            <div class="spinner-border" role="status">
                              <span class="visually-hidden">...</span>
                            </div>
                          </div>
                        </div>
                      </div>                    
                  </div>

                </div>

                <br>

                <div class="row">

                  <div class="col-6">
                      <div class="card">
                        <div class="card-header">
                          Jenis Keanggotaan
                        </div>
                        <div class="card-body">
                          <p>
                            <div id="grJenisKeanggotan">
                              <div class="spinner-border" role="status">
                                <span class="visually-hidden">...</span>
                              </div>
                            </div>
                          </p>
                        </div>
                      </div>                    
                  </div>

                  <div class="col-6">
                      <div class="card">
                        <div class="card-header">
                          Kelompok Umur
                        </div>
                        <div class="card-body">
                          <p>
                            <div id="grKelompokUmur">
                              <div class="spinner-border" role="status">
                                <span class="visually-hidden">...</span>
                              </div>
                            </div>
                          </p>
                        </div>
                      </div>                    
                  </div>

                </div>

                <br>

                <div class="row">

                  <div class="col-6">
                      <div class="card">
                        <div class="card-header">
                          Sifat Keanggotaan
                        </div>
                        <div class="card-body">
                          <p>
                            <div id="grSifatKeanggotan">
                              <div class="spinner-border" role="status">
                                <span class="visually-hidden">...</span>
                              </div>
                            </div>
                          </p>
                        </div>
                      </div>                    
                  </div>
                
                </div>

            </div>
            <div class="col-1">
            </div>

        </div>

    </div>

    <div class="modal fade" id="modalWait" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="opServer">Processing...</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="d-flex justify-content-center">
              <div class="spinner-border" role="status">
                <span class="visually-hidden">...</span>
              </div>
            </div>
            
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button type="button" class="btn btn-primary" id="btnOKServer">OK</button>
          </div>
        </div>
      </div>
    </div>

</body>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="{{ url_for('static', filename='statakumulasi.js') }}" type="module"></script>

</html>
