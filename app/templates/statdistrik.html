<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Distrik | GMI Control Panel</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
<script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
<body>
    <div class="container-fluid">

        <div class="row">

            <div class="col-1">
            </div>
            <div class="col-10">
                
                <header>
                    <nav class="navbar navbar-expand-lg bg-body-tertiary">
                        <div class="container-fluid">
                          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                            <div class="navbar-nav">
                              <a class="nav-link" href="/pengaturanmenu">Pengaturan Menu</a>
                              <a class="nav-link active" aria-current="page" href="/statdistrik">Statistik Distrik</a>
                              <a class="nav-link" href="/statakumulasi">Akumulasi</a>
                              <a class="nav-link" href="#">Statistik Keuangan</a>
                              <a class="nav-link" href="#">Asset</a>
                              <a class="nav-link" href="#">Daftar User</a>
                              <a class="nav-link" href="/logout"><span class="badge text-bg-danger">Logout</span></a>
                            </div>
                          </div>
                        </div>
                      </nav>
                </header>

                <br>
                <div class="row">
                  <div class="col-4">
                      <label>Pilih Distrik</label>
                      <select  class="col-form-label" id="slcDistrik">
                            <option value="D-I">D-I</option>
                            <option value="D-II">D-II</option>
                            <option value="D-III">D-III</option>
                            <option value="D-IV">D-IV</option>
                            <option value="D-V">D-V</option>
                            <option value="D-VI">D-VI</option>
                            <option value="D-VII">D-VII</option>
                            <option value="D-VIII">D-VIII</option>
                            <option value="D-IX">D-IX</option>
                            <option value="D-X">D-X</option>
                            <option value="D-XI">D-XI</option>
                            <option value="D-XII">D-XII</option>
                      </select>
                  </div>
                </div>
                <br>
                <div class="row">
                  <div class="col-3">
                    
                      <div class="card">
                        <div class="card-header">
                          Nama Distrik
                        </div>
                        <div class="card-body">
                          <div id="namaDistrik">
                            <div class='spinner-border wait-sign' role='status'>";
                                <span class='visually-hidden'>...</span>";
                            </div>

                          </div>
                        </div>
                      </div>                    

                  </div>
                  <div class="col-3">
                      <div class="card">
                        <div class="card-header">
                          Jumlah Gereja
                        </div>
                        <div class="card-body">
                          <div id="jlhGereja">
                            <div class='spinner-border wait-sign' role='status'>";

                            </div>

                          </div>
                        </div>
                      </div>                    

                  </div>
                  <div class="col-3">
                      <div class="card">
                        <div class="card-header">
                          Jumlah KK
                        </div>
                        <div class="card-body">
                          <div id="jlhKK">
                            <div class='spinner-border wait-sign' role='status'>";

                          </div>

                      </div>                    
                  </div>

                          </div>
                        </div>
                      </div>                    
                  </div>

                </div>

                <br>

                  <div class="col-6">
                      <div class="card">
                        <div class="card-header">
                          Jenis Keanggotaan
                        </div>
                        <div class="card-body">
                          <p>
                            <div id="grJenisKeanggotan">
                              <div class='spinner-border wait-sign' role='status'>";
                                  <span class='visually-hidden'>...</span>";
                              </div>

                            </div>
                          </p>
                        </div>
                      </div>                    
                  </div>

                  <div class="col-6">
                      <div class="card">
                        <div class="card-header">

                              </div>

                            </div>
                          </p>
                        </div>
                      </div>                    
                  </div>

                </div>

                <br>

                <div class="row">

                  <div class="col-6">
                      <div class="card">
                        <div class="card-header">
                          Sifat Keanggotaan
                        </div>

                          <p>
                            <div id="grSifatKeanggotan">
                              <div class='spinner-border wait-sign' role='status'>";
                                  <span class='visually-hidden'>...</span>";
                              </div>

                            </div>
                          </p>
                        </div>
                      </div>                    
                  </div>
                
                  <div class="col-6">
                      <div class="card">
                        <div class="card-header">
                          Data Gereja
                        </div>
                        <div class="card-body">
                          <p>
                            <table class="table" id="tblGereja">
                              <thead>
                                <tr>
                                  <td>No</td>
                                  <td>link</td>
                                  <td>Nama Gereja</td>
                                </tr>
                              </thead>
                              <tbody>

                              </tbody>
                            </table>

                      </div>

                <div class="row">

                </div>

            </div>
            <div class="col-1">
